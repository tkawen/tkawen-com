# TKAWEN reactor subdomains — reverse proxy to tkawen.online paths.

map $host $reactor_path {
    intel.tkawen.com    /intel;
    try.tkawen.com      /try;
    tools.tkawen.com    /tools;
    blog.tkawen.com     /blog;
    id.tkawen.com       /id;
    share.tkawen.com    /share;
    embed.tkawen.com    /embed;
    default             "";
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name intel.tkawen.com try.tkawen.com tools.tkawen.com blog.tkawen.com id.tkawen.com share.tkawen.com embed.tkawen.com;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    ssl_certificate     /etc/letsencrypt/live/tkawen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tkawen.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:tkawen-reactor:10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    if ($reactor_path = "") { return 404; }

    # Special case: id.tkawen.com/ → /login.php (id/ has no index)
    location = / {
        set $bare_root_target "";
        if ($host = "id.tkawen.com") { set $bare_root_target "/login.php"; }
        if ($bare_root_target != "") { return 302 $bare_root_target; }

        # Fall through to proxy for all other hosts
        proxy_pass https://tkawen.online$reactor_path/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name tkawen.online;
        proxy_set_header Host tkawen.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_domain ~^.*\.?tkawen\.online$ .tkawen.com;
        proxy_redirect ~^https?://tkawen\.online$reactor_path(/.*)?$ https://$host$1;
        proxy_redirect $reactor_path/ /;
        proxy_buffering off;
    }

    location / {
        set $upstream "tkawen.online";

        proxy_pass https://$upstream$reactor_path$request_uri;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name tkawen.online;
        proxy_ssl_verify off;

        proxy_set_header Host tkawen.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cookie_domain ~^.*\.?tkawen\.online$ .tkawen.com;
        proxy_cookie_flags ~ secure samesite=lax;

        # Strip path prefix from absolute and relative Location redirects
        proxy_redirect ~^https?://tkawen\.online$reactor_path(/.*)?$ https://$host$1;
        proxy_redirect ~^https?://tkawen\.online(/.*)$ https://$host$1;
        proxy_redirect $reactor_path/ /;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name intel.tkawen.com try.tkawen.com tools.tkawen.com blog.tkawen.com id.tkawen.com share.tkawen.com embed.tkawen.com;
    return 301 https://$host$request_uri;
}
