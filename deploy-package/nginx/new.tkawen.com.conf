# tkawen-com (v2) — staging at new.tkawen.com on VPS40.
# Production tkawen.com remains untouched until manual switchover.
#
# Place this file at:  /etc/nginx/sites-available/new.tkawen.com.conf
# Symlink:             ln -s /etc/nginx/sites-available/new.tkawen.com.conf /etc/nginx/sites-enabled/
# Reload:              nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name new.tkawen.com;

    # ACME challenge for certbot (webroot mode)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.tkawen.com;

    # TLS — fill in after `certbot certonly --webroot ...`
    ssl_certificate     /etc/letsencrypt/live/new.tkawen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.tkawen.com/privkey.pem;

    # Strong TLS defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (the Rust app also sets some; we set/override here)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "DENY" always;

    # Compression (the app supports br + gzip, nginx forwards Accept-Encoding)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 256;

    access_log /var/log/nginx/new.tkawen.com.access.log;
    error_log  /var/log/nginx/new.tkawen.com.error.log warn;

    # Proxy to the local Rust process (systemd: tkawen-com.service binds 127.0.0.1:8088)
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_read_timeout 30s;
        # Forward upstream Server-Timing (the Rust render flex)
        proxy_pass_header server-timing;
    }
}
