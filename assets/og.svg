      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#151b2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
